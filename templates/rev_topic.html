{% extends "base.html" %}
{% block content %}
<div class="main">
    <div class="breadcrumb">
        <a href="/revision">Revision</a> ›
        <a href="/revision/{{ category }}">{{ category }}</a> ›
        <span>{{ topic }}</span>
    </div>
    <div class="page-header">
        <h1>{{ topic }} — Revision</h1>
        <p>{{ questions | length }} questions</p>
    </div>

    <div class="q-grid">
        {% for q in questions %}
        <div class="q-card is-revision {% if q.solved %}is-solved{% endif %}"
             id="qcard-{{ q.id }}"
             data-solved="{{ q.solved }}"
             data-revision="{{ q.revision }}">

            <div class="q-title">{{ q.title }}</div>

            <div class="q-footer">
                <div class="q-checks">
                    <label class="q-check solved-check">
                        <input type="checkbox"
                               {% if q.solved %}checked{% endif %}
                               onchange="toggle('{{ q.id }}', 'solved', this)">
                        Solved
                    </label>
                    <label class="q-check rev-check">
                        <input type="checkbox" checked
                               onchange="removeFromRevision('{{ q.id }}', this)">
                        Revision
                    </label>
                </div>
                <a href="{{ q.url }}" target="_blank" class="q-link">↗ GO</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function removeFromRevision(qid, cb) {
    toggle(qid, 'revision', cb);
    if (!cb.checked) {
        setTimeout(() => {
            const card = document.getElementById('qcard-' + qid);
            if (card) {
                card.style.opacity    = '0';
                card.style.transform  = 'scale(0.96)';
                card.style.transition = 'all 0.25s';
                setTimeout(() => card.remove(), 260);
            }
        }, 300);
    }
}
</script>
{% endblock %}
